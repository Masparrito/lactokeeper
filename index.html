<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>GanaderoOS</title>
    <meta name="theme-color" content="#18181b">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" sizes="180x180">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      html, body {
        height: 100%;
        width: 100%;
        /* Igual al color de las barras de navegacion (zinc-900) para que la
           franja del home indicator que pinta iOS se funda con la barra y no
           se vea como un renglon negro. */
        background-color: #18181b;
        margin: 0;
        padding: 0;
        overscroll-behavior-y: none; 
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* position:fixed + inset:0 ancla el contenedor a TODO el webview en iOS
         standalone (de borde a borde, incluida la franja del home indicator),
         que ningun valor de alto (100%, 100vh, 100dvh, innerHeight) cubria de
         forma fiable. La barra de navegacion rellena la franja con su color
         via pb-[safe-area]. En Safari se ajusta a la viewport visible. */
      #root {
        position: fixed;
        top: 0; right: 0; bottom: 0; left: 0;
        width: 100%;
        isolation: isolate;
      }
      input, textarea { -webkit-user-select: text; user-select: text; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
