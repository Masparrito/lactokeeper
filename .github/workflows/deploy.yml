name: Deploy a Firebase Hosting

# Despliegue MANUAL por defecto (seguro): no se publica nada sin un disparo
# explícito. Claude puede dispararlo vía la integración de GitHub, o tú desde
# la pestaña "Actions" -> "Run workflow".
#
# (Opcional) Para auto-desplegar en cada push a main, descomenta el bloque
# 'push' de abajo.
on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build de producción (inyecta los VITE_ desde Secrets)
        run: npm run build
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_AUTH_DOMAIN: ${{ secrets.VITE_AUTH_DOMAIN }}
          VITE_PROJECT_ID: ${{ secrets.VITE_PROJECT_ID }}
          VITE_STORAGE_BUCKET: ${{ secrets.VITE_STORAGE_BUCKET }}
          VITE_MESSAGING_SENDER_ID: ${{ secrets.VITE_MESSAGING_SENDER_ID }}
          VITE_APP_ID: ${{ secrets.VITE_APP_ID }}

      # Despliega el backend seguro (Cloud Functions) ANTES que el hosting.
      # Si falla, el job se detiene aquí y el hosting NO se actualiza, de modo
      # que la app en producción sigue en la versión que funciona (nunca se
      # publica un cliente que llame a una función que aún no existe).
      - name: Desplegar Cloud Functions (backend seguro de Gemini)
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          npx --yes firebase-tools@latest deploy --only functions --project lactokeeper --non-interactive --force
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json

      - name: Desplegar a Firebase Hosting (canal live = producción)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: lactokeeper

      # Despliega las reglas de seguridad de Firestore (firestore.rules).
      # 'continue-on-error' evita que un fallo aquí tumbe el despliegue del
      # hosting (que ya se hizo en el paso anterior). El resultado real se
      # verifica en el log de este paso.
      - name: Desplegar reglas de Firestore
        continue-on-error: true
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          npx --yes firebase-tools@latest deploy --only firestore:rules --project lactokeeper --non-interactive
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
